<!DOCTYPE html>
<html>
<head>
    <title>Next Round Setup</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <h2>Next Round Setup</h2>

    <div class="card p-4 mt-4">

        <form action="/create_next_round" method="post">

            <label>Enter Motion for Next Round</label>
            <input name="motion" class="form-control mb-3" placeholder="Enter debate motion">

            <button class="btn btn-primary w-100">
                Create Next Round
            </button>

        </form>

    </div>

</div>

</body>
</html>
