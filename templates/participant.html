<!DOCTYPE html>
<html>
<head>
    <title>Participant</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<!-- SIDEBAR (CONSISTENT UI) -->
<div class="sidebar">
    <h4 class="mb-4">DebatePro</h4>

    <a href="/dashboard">Dashboard</a>
    <a href="/admin">Admin</a>
    <a href="/judge">Judge</a>
    <a href="/leaderboard">Leaderboard</a>
    <a href="/bracket">Bracket</a>
</div>

<!-- MAIN -->
<div class="main">

<h2 class="mb-4">Participant Dashboard</h2>

<!-- QUICK ACTIONS -->
<div class="row">

    <div class="col-md-4">
        <div class="card text-center">
            <h5>Leaderboard</h5>
            <p>Check rankings and scores</p>

            <a href="/leaderboard" class="btn btn-primary">
                View Results
            </a>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card text-center">
            <h5>Your Matches</h5>
            <p>See your debate schedule</p>

            <a href="/judge" class="btn btn-success">
                View Matches
            </a>
        </div>
    </div>

</div>

<!-- MATCH PREVIEW -->
<div class="card mt-4">
    <h5>Upcoming Matches</h5>

    <ul class="list-group">
        {% for m in matches %}
        <li class="list-group-item">
            {{ m[1] }} vs {{ m[2] }}
            <span class="float-end text-muted">
                {{ m[3] }}
            </span>
        </li>
        {% endfor %}
    </ul>
</div>

</div>

</body>
</html>
